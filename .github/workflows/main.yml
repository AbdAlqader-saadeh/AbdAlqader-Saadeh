name: GitHub-Profile-Summary-Cards

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: vn7n24fzkq/github-profile-summary-cards@release
        with:
          USERNAME: AbdAlqader-saadeh
          UTC_OFFSET: 0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
